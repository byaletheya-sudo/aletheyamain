<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nova Admins — Notes</title>
<link rel="stylesheet" href="/nova-admins/common.css">
<script src="/nova-admins/common.js"></script>
<style>
  :root{
    --na-bg:#0c0d11; --na-panel:#15171e; --na-panel-2:#1b1e27; --na-line:rgba(255,255,255,.07);
    --na-line-2:rgba(255,255,255,.12); --na-fg:#e8eaf0; --na-muted:#8b909e; --na-muted-2:#646a78;
    --na-blue:#3a8eef; --na-purple:#8a5cf0; --na-green:#34d399; --na-red:#f87171; --na-amber:#fbbf24;
    --na-mono:"SF Mono",ui-monospace,"Roboto Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--na-bg);color:var(--na-fg);
    font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;font-size:13.5px;line-height:1.45;
    -webkit-font-smoothing:antialiased;}
  .na-app{max-width:1320px;margin:0 auto;padding:26px 26px 60px;}

  .na-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--na-muted-2);font-weight:700;}
  .na-eyebrow b{color:var(--na-blue);}
  .na-title-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:4px 0 18px;flex-wrap:wrap;}
  .na-title{font-size:30px;font-weight:760;letter-spacing:-.02em;margin:2px 0 0;}
  .na-right{display:flex;align-items:center;gap:9px;}
  .suite-nav{display:inline-flex;gap:4px;background:var(--na-panel);border:1px solid var(--na-line);border-radius:11px;padding:3px;margin-top:12px;}
  .suite-nav a{text-decoration:none;color:var(--na-muted);font-size:12.5px;font-weight:650;padding:6px 13px;border-radius:8px;}
  .suite-nav a.on{background:var(--na-panel-2);color:var(--na-fg);box-shadow:0 1px 0 rgba(255,255,255,.04) inset;}
  .suite-nav a:not(.on):hover{color:var(--na-fg);}
  .save-tag{font-size:11px;font-weight:650;padding:5px 11px;border-radius:20px;border:1px solid var(--na-line);background:var(--na-panel);white-space:nowrap;}
  .save-tag.ok{color:var(--na-green);border-color:rgba(52,211,153,.3);}
  .save-tag.saving{color:var(--na-amber);border-color:rgba(251,191,36,.3);}
  .save-tag.err{color:var(--na-red);border-color:rgba(248,113,113,.3);}
  .na-btn{all:unset;cursor:pointer;background:var(--na-blue);color:#fff;border-radius:10px;padding:9px 14px;font-size:12.5px;font-weight:650;display:inline-flex;align-items:center;gap:6px;}
  .na-btn.ghost{background:var(--na-panel);color:var(--na-fg);border:1px solid var(--na-line);}
  .mini{font-size:10.5px;color:var(--na-muted-2);}
  .hide{display:none;}

  /* shell: sidebar + editor */
  .nshell{display:grid;grid-template-columns:300px 1fr;gap:14px;align-items:start;min-height:70vh;}
  .nside{background:var(--na-panel);border:1px solid var(--na-line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;max-height:78vh;}
  .nside-top{padding:12px;display:flex;gap:8px;border-bottom:1px solid var(--na-line);}
  .nsearch{flex:1;background:var(--na-panel-2);border:1px solid var(--na-line);color:var(--na-fg);border-radius:9px;padding:8px 11px;font-size:12.5px;font-family:inherit;outline:none;min-width:0;}
  .nsearch:focus{border-color:var(--na-line-2);}
  .nside-list{overflow:auto;flex:1;}
  .nrow{padding:11px 14px;border-bottom:1px solid var(--na-line);cursor:pointer;}
  .nrow:hover{background:var(--na-panel-2);}
  .nrow.on{background:var(--na-panel-2);box-shadow:inset 3px 0 0 var(--na-amber);}
  .nrow .rt{font-size:13.5px;font-weight:650;display:flex;align-items:center;gap:6px;min-width:0;}
  .nrow .rt span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nrow .rs{font-size:11.5px;color:var(--na-muted);margin-top:3px;display:flex;gap:8px;}
  .nrow .rs .dt{font-family:var(--na-mono);color:var(--na-muted-2);flex:none;}
  .nrow .rs .sn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nempty{padding:26px 14px;text-align:center;color:var(--na-muted-2);font-size:12px;}

  .ned{background:var(--na-panel);border:1px solid var(--na-line);border-radius:16px;min-height:70vh;display:flex;flex-direction:column;}
  .ned-bar{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid var(--na-line);flex-wrap:wrap;}
  .bt{all:unset;cursor:pointer;padding:5px 10px;border-radius:8px;font-size:11.5px;font-weight:650;color:var(--na-muted);border:1px solid transparent;}
  .bt:hover{background:var(--na-panel-2);color:var(--na-fg);}
  .bt.warn{color:var(--na-red);}
  .ned-bar .sp{flex:1;}
  .ned-body{padding:20px 26px 40px;flex:1;overflow:auto;cursor:text;}
  .ntitle{width:100%;background:transparent;border:none;outline:none;color:var(--na-fg);font-size:26px;font-weight:760;letter-spacing:-.02em;font-family:inherit;padding:0 0 10px;}
  .ntitle::placeholder{color:var(--na-muted-2);}
  .nbadge{font-size:9.5px;font-weight:650;color:var(--na-muted);background:var(--na-panel-2);border:1px solid var(--na-line);border-radius:5px;padding:1px 6px;margin-left:6px;flex:none;white-space:nowrap;}
  .shr-menu{position:absolute;z-index:250;background:var(--na-panel);border:1px solid var(--na-line-2);border-radius:12px;padding:6px;box-shadow:0 20px 50px rgba(0,0,0,.5);width:190px;}
  .shr-menu .hd{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--na-muted);padding:6px 8px 5px;}
  .shr-item{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;cursor:pointer;font-size:12.5px;color:var(--na-fg);}
  .shr-item:hover{background:var(--na-panel-2);}
  .shr-av{width:22px;height:22px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;}
  .shr-item .chk{margin-left:auto;color:var(--na-green);opacity:0;font-weight:800;} .shr-item.on .chk{opacity:1;}
  .blk{display:flex;align-items:flex-start;gap:9px;padding:2px 0;}
  .blk-t{flex:1;outline:none;min-height:1.4em;word-break:break-word;white-space:pre-wrap;}
  .blk-t:empty:focus::before{content:attr(data-ph);color:var(--na-muted-2);}
  .blk.h1 .blk-t{font-size:20px;font-weight:720;letter-spacing:-.01em;margin-top:8px;}
  .blk.h2 .blk-t{font-size:16px;font-weight:680;margin-top:5px;}
  .blk.bullet::before{content:"•";color:var(--na-muted);margin-top:1px;flex:none;}
  .blk.todo input[type=checkbox]{accent-color:var(--na-green);width:15px;height:15px;margin-top:3px;flex:none;cursor:pointer;}
  .blk.todo.done .blk-t{text-decoration:line-through;color:var(--na-muted-2);}
  .blk.img{position:relative;padding:6px 0;}
  .blk.img img{max-width:100%;max-height:460px;border-radius:10px;border:1px solid var(--na-line);display:block;}
  .imgdel{position:absolute;top:12px;right:8px;all:unset;cursor:pointer;background:rgba(0,0,0,.55);color:#fff;width:24px;height:24px;border-radius:7px;text-align:center;line-height:24px;font-size:12px;opacity:0;transition:opacity .12s;}
  .blk.img:hover .imgdel{opacity:1;}
  .ned-body.dropping{outline:2px dashed var(--na-blue);outline-offset:-8px;border-radius:12px;}
  .slashmenu{position:absolute;z-index:200;background:var(--na-panel);border:1px solid var(--na-line-2);border-radius:12px;padding:5px;box-shadow:0 20px 50px rgba(0,0,0,.5);width:200px;}
  .slashmenu button{all:unset;cursor:pointer;display:flex;align-items:center;gap:10px;width:100%;box-sizing:border-box;padding:8px 10px;border-radius:8px;font-size:12.5px;color:var(--na-fg);}
  .slashmenu button:hover{background:var(--na-panel-2);}
  .slashmenu .k{color:var(--na-muted);font-size:13px;width:20px;text-align:center;}
  .ned-hint{color:var(--na-muted-2);font-size:11px;padding:8px 26px 14px;border-top:1px solid var(--na-line);}
  .ned-blank{flex:1;display:flex;align-items:center;justify-content:center;color:var(--na-muted-2);font-size:13px;}
  .nback{display:none;}

  @media (max-width:720px){
    .na-app{padding:16px 14px 50px;}
    .na-title{font-size:24px;}
    .nshell{grid-template-columns:1fr;}
    .nshell.editing .nside{display:none;}
    .nshell:not(.editing) .ned{display:none;}
    .nside{max-height:none;}
    .nback{display:inline-flex;}
    .ned-body{padding:16px 16px 30px;}
    .ned-hint{padding:8px 16px 12px;}
  }
</style>
</head>
<body>
<div class="na-app">

  <div class="na-eyebrow">NOVA ADMINS · <b>byAletheya</b></div>
  <div class="na-title-row">
    <div>
      <h1 class="na-title">Notes</h1>
      <nav class="suite-nav">
        <a href="/nova-admins">Deal Ledger</a>
        <a href="/nova-admins/tasks">Tasks</a>
        <a class="on" href="/nova-admins/notes">Notes</a>
      </nav>
    </div>
    <div class="na-right"><span id="saveTag" class="save-tag hide"></span> <a class="na-btn ghost" style="text-decoration:none;padding:6px 11px;font-size:11.5px" href="/logout" title="Sign out of everything">🔒 Lock</a></div>
  </div>

  <div class="nshell" id="nshell">
    <aside class="nside">
      <div class="nside-top">
        <input class="nsearch" id="nSearch" placeholder="Search notes…" oninput="renderList()">
        <button class="na-btn" style="padding:8px 12px" onclick="newNote()">+</button>
      </div>
      <div class="nside-list" id="nList"></div>
    </aside>
    <section class="ned" id="nEd"></section>
  </div>

</div>
<div id="slashMenu" class="slashmenu hide"></div>
<div id="shareMenu" class="shr-menu hide"></div>
<input type="file" id="imgFile" accept="image/*" class="hide" onchange="if(this.files[0])downscaleImg(this.files[0],addImageFromData);this.value='';">


<script>
/*NOVA_SEED*/
const SEED=(typeof window!=="undefined"&&window.NOVA_SEED)||{};
const NOTES=SEED.notes||[];
const NOVA_USER=(window.NOVA_USER&&window.NOVA_USER.id)?window.NOVA_USER:{id:"edgar",name:"Edgar",role:"owner"};
const ME=NOVA_USER.id;
const TEAM=[{id:"edgar",name:"Edgar",color:"#3a8eef"},{id:"nema",name:"Nema",color:"#f472b6"},{id:"arvin",name:"Arvin",color:"#8a5cf0"}];
function uName(id){ const u=TEAM.find(x=>x.id===id); return u?u.name:id; }
function uColor(id){ const u=TEAM.find(x=>x.id===id); return u?u.color:"#3a8eef"; }
// Legacy notes (pre-accounts) had no owner — make them Edgar's, visible to all, so nothing disappears.
NOTES.forEach(n=>{ if(!n.owner){ n.owner="edgar"; n.sharedWith=TEAM.filter(u=>u.id!=="edgar").map(u=>u.id); } if(!Array.isArray(n.sharedWith)) n.sharedWith=[]; });
function canSee(n){ return n.owner===ME || (n.sharedWith||[]).includes(ME); }
const NOW=new Date(), _pad=n=>String(n).padStart(2,"0");
const TODAY=NOW.getFullYear()+"-"+_pad(NOW.getMonth()+1)+"-"+_pad(NOW.getDate());
let _saveT=null;
function queueSave(){ const n=cur(); if(!n)return; n.updated=TODAY; clearTimeout(_saveT); _saveT=setTimeout(()=>saveNote(n),700); renderList(); }
async function saveNote(n){ await externalizeImages(n); saveRow({note:n}); }
// Replace any inline base64 image with a stored URL so the note payload stays tiny.
async function externalizeImages(n){ for(const b of (n.blocks||[])){ if(b.t==="img" && typeof b.src==="string" && b.src.slice(0,5)==="data:"){ b.src=await uploadImg(b.src); } } }

let curId=null;
function cur(){ return NOTES.find(n=>n.id===curId); }
function snippet(n){ const b=(n.blocks||[]).find(x=>(x.text||"").trim()); return b?b.text.slice(0,60):"No additional text"; }
function fdate(d){ if(!d)return""; const t=new Date(d+"T12:00:00"); return t.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }

// ---- sidebar ----
function sorted(){ return NOTES.slice().sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.updated||"").localeCompare(a.updated||"")); }
function renderList(){
  const q=(document.getElementById("nSearch").value||"").toLowerCase().trim();
  let list=sorted().filter(canSee);
  if(q) list=list.filter(n=>((n.title||"")+" "+(n.blocks||[]).map(b=>b.text||"").join(" ")).toLowerCase().includes(q));
  document.getElementById("nList").innerHTML = list.length? list.map(n=>{
    const badge = n.owner!==ME ? `<span class="nbadge">from ${esc(uName(n.owner))}</span>`
                : (n.sharedWith||[]).length ? `<span class="nbadge">shared · ${n.sharedWith.length}</span>` : "";
    return `<div class="nrow ${n.id===curId?'on':''}" onclick="openNote(${n.id})">
      <div class="rt">${n.pinned?'📌 ':''}<span>${esc(n.title)||'New note'}</span>${badge}</div>
      <div class="rs"><span class="dt">${fdate(n.updated||n.created)}</span><span class="sn">${esc(snippet(n))}</span></div>
    </div>`;}).join("") : `<div class="nempty">${q?'No notes match.':'No notes yet — hit + to start one.'}</div>`;
}

// ---- editor ----
const PH={p:"Write something, or press “/” for blocks",h1:"Heading",h2:"Subheading",bullet:"List item",todo:"To-do"};
const SLASH=[{t:"p",k:"Aa",l:"Text"},{t:"h1",k:"H1",l:"Heading"},{t:"h2",k:"H2",l:"Subheading"},{t:"bullet",k:"•",l:"Bullet list"},{t:"todo",k:"☑",l:"To-do"},{t:"img",k:"🖼",l:"Image"}];
function openNote(id){ curId=id; renderList(); renderEd(); document.getElementById("nshell").classList.add("editing"); }
function backToList(){ curId=null; document.getElementById("nshell").classList.remove("editing"); renderList(); renderEd(); }
function renderEd(focusIdx,caretEnd){
  const el=document.getElementById("nEd"), n=cur();
  if(!n){ el.innerHTML=`<div class="ned-blank">Pick a note — or start a new one.</div>`; return; }
  el.innerHTML=`
    <div class="ned-bar">
      <button class="bt nback" onclick="backToList()">‹ Notes</button>
      <button class="bt" onclick="setType('p')">Aa Text</button>
      <button class="bt" onclick="setType('h1')">H1</button>
      <button class="bt" onclick="setType('h2')">H2</button>
      <button class="bt" onclick="setType('bullet')">• List</button>
      <button class="bt" onclick="setType('todo')">☑ To-do</button>
      <span class="sp"></span>
      ${n.owner===ME
        ? `<button class="bt" onclick="openShare(event)">👥 Share${(n.sharedWith||[]).length?' · '+n.sharedWith.length:''}</button>`
        : `<span class="bt" style="cursor:default;opacity:.75">👥 From ${esc(uName(n.owner))}</span>`}
      <button class="bt" onclick="togglePin()">${n.pinned?'📌 Unpin':'📌 Pin'}</button>
      ${n.owner===ME?`<button class="bt warn" onclick="delNote()">Delete</button>`:''}
    </div>
    <div class="ned-body" onclick="if(event.target===this)addBlockEnd()"
      onpaste="onPaste(event)" ondragover="event.preventDefault();this.classList.add('dropping')" ondragleave="this.classList.remove('dropping')" ondrop="this.classList.remove('dropping');onDrop(event)">
      <input class="ntitle" placeholder="Title" value="${esc(n.title)}" oninput="cur().title=this.value;queueSave()"
        onkeydown="if(event.key==='Enter'){event.preventDefault();focusBlk(0);}">
      <div id="blocks">${n.blocks.map((b,i)=>blkHtml(b,i)).join("")}</div>
    </div>
    <div class="ned-hint">Press “/” for blocks · “# ” heading · “- ” list · “[] ” to-do · paste or drop an image 🖼 · Backspace on empty removes</div>`;
  if(focusIdx!=null) focusBlk(focusIdx,caretEnd);
}
function blkHtml(b,i){
  if(b.t==="img"){
    return `<div class="blk img" data-i="${i}"><img src="${b.src||''}" alt="" onclick="event.stopPropagation()">
      <button class="imgdel" title="Remove image" onclick="delBlock(${i})">✕</button></div>`;
  }
  return `<div class="blk ${b.t} ${b.t==='todo'&&b.done?'done':''}" data-i="${i}">`
    + (b.t==='todo'?`<input type="checkbox" ${b.done?'checked':''} onchange="tickTodo(${i},this.checked)">`:"")
    + `<div class="blk-t" contenteditable="true" data-ph="${PH[b.t]||''}" data-i="${i}"
        oninput="onBlkInput(${i},this)" onkeydown="onBlkKey(event,${i},this)" onfocus="curBlk=${i}">${esc(b.text)}</div></div>`;
}
// ---- slash command menu ----
let slashBlk=null;
function openSlash(i,el){
  slashBlk=i; const r=el.getBoundingClientRect(), m=document.getElementById("slashMenu");
  m.innerHTML=SLASH.map(s=>`<button onmousedown="event.preventDefault()" onclick="slashPick('${s.t}')"><span class="k">${s.k}</span>${s.l}</button>`).join("");
  m.style.left=(r.left+window.scrollX)+"px"; m.style.top=(r.bottom+window.scrollY+4)+"px"; m.classList.remove("hide");
}
function closeSlash(){ document.getElementById("slashMenu").classList.add("hide"); slashBlk=null; }
function slashPick(type){
  const n=cur(), i=slashBlk; closeSlash(); if(i==null||!n||!n.blocks[i])return;
  const b=n.blocks[i]; b.text="";
  if(type==="img"){ renderEd(i); pickImage(); return; }
  b.t=type; if(type==="todo")b.done=false; renderEd(i); queueSave();
}
// ---- images ----
function pickImage(){ document.getElementById("imgFile").click(); }
function downscaleImg(file, cb){
  const rd=new FileReader();
  rd.onload=e=>{ const img=new Image(); img.onload=()=>{
    const max=1600; let w=img.width,h=img.height;
    if(w>max||h>max){ const s=max/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
    const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
    cv.getContext("2d").drawImage(img,0,0,w,h);
    try{ cb(cv.toDataURL("image/jpeg",0.82)); }catch(x){ cb(e.target.result); }
  }; img.onerror=()=>cb(e.target.result); img.src=e.target.result; };
  rd.readAsDataURL(file);
}
function addImage(src){
  const n=cur(); if(!n)return;
  let at=(curBlk!=null && n.blocks[curBlk]!=null)?curBlk:n.blocks.length-1;
  if(n.blocks[at] && n.blocks[at].t==="p" && !(n.blocks[at].text||"").trim()){ n.blocks[at]={t:"img",src}; }
  else { n.blocks.splice(at+1,0,{t:"img",src}); at++; }
  if(!n.blocks[at+1]) n.blocks.push({t:"p",text:""});
  renderEd(at+1); queueSave();
}
// Upload an image ONCE to the server and store its URL — so autosaves never
// re-ship the base64. Falls back to inline data-URL if the upload can't happen.
async function uploadImg(dataUrl){
  if(location.protocol==="file:") return dataUrl;
  try{ const r=await fetch("/nova-admins/img",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:dataUrl})});
    const o=await r.json(); return (r.ok&&o.url)?o.url:dataUrl; }
  catch(e){ return dataUrl; }
}
async function addImageFromData(dataUrl){ addImage(await uploadImg(dataUrl)); }
function delBlock(i){ const n=cur(); n.blocks.splice(i,1); if(!n.blocks.length)n.blocks.push({t:"p",text:""}); renderEd(Math.max(0,i-1)); queueSave(); }
function onPaste(e){ const items=(e.clipboardData||{}).items||[];
  for(const it of items){ if(it.type&&it.type.indexOf("image")===0){ e.preventDefault(); const f=it.getAsFile(); if(f) downscaleImg(f,addImageFromData); return; } } }
function onDrop(e){ const files=(e.dataTransfer||{}).files||[];
  for(const f of files){ if(f.type&&f.type.indexOf("image")===0){ e.preventDefault(); downscaleImg(f,addImageFromData); return; } } }
let curBlk=0;
function focusBlk(i,caretEnd=true){
  const el=document.querySelector(`.blk-t[data-i="${i}"]`); if(!el)return;
  el.focus();
  if(caretEnd){ const r=document.createRange(); r.selectNodeContents(el); r.collapse(false);
    const s=getSelection(); s.removeAllRanges(); s.addRange(r); }
}
function onBlkInput(i,el){
  const n=cur(), b=n.blocks[i], t=el.textContent;
  if(t==="/"&&b.t==="p"){ b.text="/"; openSlash(i,el); return; }   // slash command menu
  closeSlash();
  // markdown shortcuts
  const conv=[["# ","h1"],["## ","h2"],["- ","bullet"],["* ","bullet"],["[] ","todo"],["[ ] ","todo"]];
  for(const [pre,type] of conv){
    if(t.startsWith(pre)&&b.t==="p"){ b.t=type; b.text=t.slice(pre.length); if(type==="todo")b.done=false; renderEd(i); queueSave(); return; }
  }
  b.text=t; queueSave();
}
function onBlkKey(e,i,el){
  const n=cur();
  if(e.key==="Escape"){ closeSlash(); return; }
  if(slashBlk===i && (e.key==="Enter")){ e.preventDefault(); slashPick("p"); return; }
  if(e.key==="Enter"){ e.preventDefault();
    const t=n.blocks[i].t, keep=(t==="bullet"||t==="todo")&&el.textContent.trim();
    n.blocks.splice(i+1,0,{t:keep?t:"p",text:"",...(keep&&t==="todo"?{done:false}:{})});
    renderEd(i+1); queueSave(); return; }
  if(e.key==="Backspace"&&!el.textContent){ e.preventDefault();
    if(n.blocks[i].t!=="p"){ n.blocks[i].t="p"; renderEd(i); queueSave(); return; }   // demote first
    if(n.blocks.length>1){ n.blocks.splice(i,1); renderEd(Math.max(0,i-1)); queueSave(); } return; }
  if(e.key==="ArrowUp"&&i>0&&getSelection().anchorOffset===0){ e.preventDefault(); focusBlk(i-1); }
  if(e.key==="ArrowDown"&&i<n.blocks.length-1){ const s=getSelection();
    if(s.anchorOffset===(el.textContent||"").length){ e.preventDefault(); focusBlk(i+1); } }
}
function tickTodo(i,val){ const n=cur(); n.blocks[i].done=val; renderEd(); queueSave(); }
function setType(t){ const n=cur(); if(!n)return; const b=n.blocks[curBlk]; if(!b)return;
  b.t=t; if(t==="todo"&&b.done===undefined)b.done=false; renderEd(curBlk); queueSave(); }
function addBlockEnd(){ const n=cur(); if(!n)return; n.blocks.push({t:"p",text:""}); renderEd(n.blocks.length-1); queueSave(); }
function togglePin(){ const n=cur(); n.pinned=!n.pinned; renderEd(); queueSave(); }
function newNote(){
  const id=(NOTES.reduce((m,n)=>Math.max(m,n.id),0)||0)+1;
  NOTES.unshift({id,title:"",blocks:[{t:"p",text:""}],pinned:false,owner:ME,sharedWith:[],created:TODAY,updated:TODAY});
  saveRow({note:NOTES[0]}); openNote(id);
  setTimeout(()=>{const el=document.querySelector(".ntitle"); if(el)el.focus();},40);
}
function delNote(){ const n=cur(); if(!n)return; if(n.owner!==ME){ alert("Only the owner can delete this note."); return; } if(!confirm("Delete this note?"))return;
  const i=NOTES.findIndex(x=>x.id===n.id); NOTES.splice(i,1); saveRow({deleteNote:n.id}); backToList(); }

// ---- sharing (owner shares a note with teammates; they can view + edit) ----
function openShare(e){ e.stopPropagation(); const n=cur(); if(!n||n.owner!==ME)return;
  const m=document.getElementById("shareMenu"), others=TEAM.filter(u=>u.id!==ME);
  m.innerHTML=`<div class="hd">Share with</div>`+others.map(u=>{
    const on=(n.sharedWith||[]).includes(u.id);
    return `<div class="shr-item ${on?'on':''}" onclick="toggleShare('${u.id}')"><span class="shr-av" style="background:${u.color}">${u.name[0]}</span>${u.name}<span class="chk">✓</span></div>`;
  }).join("");
  const r=e.currentTarget.getBoundingClientRect();
  m.style.top=(r.bottom+window.scrollY+6)+"px"; m.style.left=(Math.max(8,r.right+window.scrollX-190))+"px"; m.classList.remove("hide");
}
function closeShare(){ const m=document.getElementById("shareMenu"); if(m)m.classList.add("hide"); }
function toggleShare(uid){ const n=cur(); if(!n||n.owner!==ME)return; n.sharedWith=n.sharedWith||[];
  const i=n.sharedWith.indexOf(uid); if(i>=0)n.sharedWith.splice(i,1); else n.sharedWith.push(uid);
  queueSave();
  const others=TEAM.filter(u=>u.id!==ME);
  document.querySelectorAll('#shareMenu .shr-item').forEach((el,idx)=>el.classList.toggle('on',(n.sharedWith||[]).includes(others[idx].id)));
  const btn=document.querySelector('.ned-bar .bt[onclick^="openShare"]'); if(btn) btn.textContent='👥 Share'+(n.sharedWith.length?' · '+n.sharedWith.length:'');
}

// ---- boot ----
document.addEventListener("click",e=>{ if(slashBlk!=null && !e.target.closest("#slashMenu") && !e.target.closest(".blk-t")) closeSlash();
  if(!e.target.closest("#shareMenu") && !e.target.closest('.bt[onclick^="openShare"]')) closeShare(); });
renderList(); renderEd();
const _visible=sorted().filter(canSee);
if(_visible.length && window.innerWidth>720){ openNote(_visible[0].id); document.getElementById("nshell").classList.remove("editing"); }
if(location.hash.indexOf("open")>=0 && _visible.length){ openNote(_visible[0].id); }
</script>
