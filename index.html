<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aletheya — Vehicle Image Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
  }

  .subtitle {
    color: #888;
    margin-bottom: 32px;
    font-size: 0.95rem;
  }

  .config-card {
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .config-card h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: #aaa;
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 14px;
    color: #fff;
    font-size: 0.9rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    line-height: 1.6;
    outline: none;
    resize: vertical;
    min-height: 180px;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: #4a9eff; }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
  }

  button {
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-start { background: #4a9eff; color: #fff; }
  .btn-start:hover { background: #3a8eef; }
  .btn-start:disabled { background: #333; color: #666; cursor: not-allowed; }

  .btn-stop { background: #ff4a4a; color: #fff; }
  .btn-stop:hover { background: #e63e3e; }
  .btn-stop:disabled { background: #333; color: #666; cursor: not-allowed; }

  .progress-bar {
    background: #1a1a1a;
    border-radius: 8px;
    height: 8px;
    margin-bottom: 12px;
    overflow: hidden;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4a9eff, #7b5cff);
    border-radius: 8px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .status {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 24px;
    min-height: 24px;
  }

  .status.active { color: #4a9eff; }
  .status.error { color: #ff4a4a; }
  .status.done { color: #4aff7b; }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .gallery-item {
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .gallery-item:hover { transform: translateY(-2px); }

  .gallery-item img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
  }

  .gallery-item .info { padding: 14px; }

  .gallery-item .vehicle-name {
    font-weight: 600;
    font-size: 0.95rem;
    color: #fff;
    margin-bottom: 4px;
  }

  .gallery-item .file-name {
    font-size: 0.75rem;
    color: #666;
    word-break: break-all;
  }

  .download-link {
    color: #4a9eff;
    text-decoration: none;
  }

  .download-link:hover { text-decoration: underline; }

  .gallery-item.generating { border-color: #4a9eff; }

  .gallery-item .placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #333;
    border-top-color: #4a9eff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .gallery { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Aletheya</h1>
  <p class="subtitle">Generate AI images for your vehicle inventory, one at a time.</p>

  <div class="config-card">
    <h2>Vehicle List</h2>
    <label for="vehicleList">One vehicle per line</label>
    <textarea id="vehicleList" placeholder="2026 Mercedes-Benz C300&#10;2026 Mercedes-Benz GLA 250&#10;2025 BMW X3 xDrive30i&#10;2024 Audi Q5 Premium"></textarea>
  </div>

  <div class="controls">
    <button class="btn-start" id="startBtn">Start Generating</button>
    <button class="btn-stop" id="stopBtn" disabled>Stop</button>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="status" id="status"></div>

  <div class="gallery" id="gallery"></div>
</div>

<script>
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const statusEl = document.getElementById('status');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const gallery = document.getElementById('gallery');

  let aborted = false;

  startBtn.addEventListener('click', startGeneration);
  stopBtn.addEventListener('click', () => {
    aborted = true;
    stopBtn.disabled = true;
    setStatus('Stopping after current image finishes...', '');
  });

  function setStatus(text, type) {
    statusEl.textContent = text;
    statusEl.className = 'status ' + (type || '');
  }

  function setProgress(current, total) {
    progressBar.style.display = 'block';
    progressFill.style.width = `${(current / total) * 100}%`;
  }

  function createCard(vehicle) {
    const div = document.createElement('div');
    div.className = 'gallery-item generating';
    div.innerHTML = `
      <div class="placeholder"><div class="spinner"></div></div>
      <div class="info">
        <div class="vehicle-name">${vehicle}</div>
        <div class="file-name">Generating...</div>
      </div>`;
    gallery.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return div;
  }

  function showSuccess(card, vehicle, filename, imageData) {
    card.className = 'gallery-item';
    card.innerHTML = `
      <img src="data:image/png;base64,${imageData}" alt="${vehicle}">
      <div class="info">
        <div class="vehicle-name">${vehicle}</div>
        <a class="file-name download-link" href="data:image/png;base64,${imageData}" download="${filename}">Download</a>
      </div>`;
  }

  function showError(card, message) {
    card.className = 'gallery-item';
    card.querySelector('.placeholder').innerHTML =
      `<span style="color:#ff4a4a;font-size:0.85rem;padding:20px;text-align:center">${message}</span>`;
    card.querySelector('.file-name').textContent = message;
  }

  async function startGeneration() {
    const vehicleText = document.getElementById('vehicleList').value.trim();
    if (!vehicleText) { setStatus('Please add at least one vehicle.', 'error'); return; }

    const vehicles = vehicleText.split('\n').map(v => v.trim()).filter(Boolean);
    if (!vehicles.length) { setStatus('No vehicles found.', 'error'); return; }

    aborted = false;
    startBtn.disabled = true;
    stopBtn.disabled = false;
    gallery.innerHTML = '';

    let completed = 0;
    let failed = 0;

    for (let i = 0; i < vehicles.length; i++) {
      if (aborted) break;

      const vehicle = vehicles[i];
      setStatus(`Generating ${i + 1} of ${vehicles.length}: ${vehicle}...`, 'active');
      setProgress(i, vehicles.length);

      const card = createCard(vehicle);

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 180000);

        const resp = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vehicle }),
          signal: controller.signal,
        });

        clearTimeout(timeout);
        const data = await resp.json();

        if (data.error) {
          showError(card, data.error);
          failed++;
        } else {
          showSuccess(card, vehicle, data.filename, data.image_data);
          completed++;
        }
      } catch (err) {
        const msg = err.name === 'AbortError' ? 'Timed out (3 min)' : 'Network error';
        showError(card, msg);
        failed++;
      }

      setProgress(i + 1, vehicles.length);
    }

    startBtn.disabled = false;
    stopBtn.disabled = true;

    if (aborted) {
      setStatus(`Stopped. ${completed} completed, ${failed} failed.`, '');
    } else {
      const summary = failed
        ? `Done. ${completed} completed, ${failed} failed.`
        : `Done! All ${completed} images generated.`;
      setStatus(summary, failed ? 'error' : 'done');
    }
  }
</script>
</body>
</html>
