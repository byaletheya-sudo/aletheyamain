<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Image Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
  }

  .subtitle {
    color: #888;
    margin-bottom: 32px;
    font-size: 0.95rem;
  }

  .config-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }

  .config-card {
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 24px;
  }

  .config-card h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #888;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: #aaa;
    margin-bottom: 6px;
  }

  input[type="text"],
  textarea {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 14px;
    color: #fff;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus {
    border-color: #4a9eff;
  }

  textarea {
    resize: vertical;
    min-height: 200px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85rem;
    line-height: 1.6;
  }

  .prompt-input {
    min-height: 60px;
  }

  .hint {
    font-size: 0.75rem;
    color: #666;
    margin-top: 6px;
  }

  .key-status {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    margin-bottom: 16px;
  }

  .key-status.ok {
    background: #0d1f0d;
    border: 1px solid #1a3a1a;
    color: #4aff7b;
  }

  .key-status.missing {
    background: #1f0d0d;
    border: 1px solid #3a1a1a;
    color: #ff4a4a;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
  }

  button {
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-start {
    background: #4a9eff;
    color: #fff;
  }

  .btn-start:hover { background: #3a8eef; }
  .btn-start:disabled { background: #333; color: #666; cursor: not-allowed; }

  .btn-stop {
    background: #ff4a4a;
    color: #fff;
  }

  .btn-stop:hover { background: #e63e3e; }
  .btn-stop:disabled { background: #333; color: #666; cursor: not-allowed; }

  .progress-bar {
    background: #1a1a1a;
    border-radius: 8px;
    height: 8px;
    margin-bottom: 12px;
    overflow: hidden;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4a9eff, #7b5cff);
    border-radius: 8px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .status {
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 24px;
    min-height: 24px;
  }

  .status.active { color: #4a9eff; }
  .status.error { color: #ff4a4a; }
  .status.done { color: #4aff7b; }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .gallery-item {
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .gallery-item:hover { transform: translateY(-2px); }

  .gallery-item img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
  }

  .gallery-item .info {
    padding: 14px;
  }

  .gallery-item .vehicle-name {
    font-weight: 600;
    font-size: 0.95rem;
    color: #fff;
    margin-bottom: 4px;
  }

  .gallery-item .file-name {
    font-size: 0.75rem;
    color: #666;
    word-break: break-all;
  }

  .download-link {
    color: #4a9eff;
    text-decoration: none;
    cursor: pointer;
  }

  .download-link:hover {
    text-decoration: underline;
  }

  .gallery-item.generating {
    border-color: #4a9eff;
  }

  .gallery-item.generating img {
    display: none;
  }

  .gallery-item .placeholder {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #333;
    border-top-color: #4a9eff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .config-section { grid-template-columns: 1fr; }
    .gallery { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Vehicle Image Generator</h1>
  <p class="subtitle">Generate AI images for your vehicle inventory, one at a time.</p>

  <div class="config-section" style="grid-template-columns: 1fr;">
    <div class="config-card">
      <h2>Vehicle List</h2>
      <label for="vehicleList">One vehicle per line</label>
      <textarea id="vehicleList" placeholder="2024 Toyota Camry XSE
2024 Honda Civic Sport
2023 BMW M3 Competition
2024 Ford Mustang GT"></textarea>
    </div>
  </div>

  <div class="controls">
    <button class="btn-start" id="startBtn" onclick="startGeneration()">Start Generating</button>
    <button class="btn-stop" id="stopBtn" onclick="stopGeneration()" disabled>Stop</button>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="status" id="status"></div>

  <div class="gallery" id="gallery"></div>
</div>

<script>
  let running = false;
  let aborted = false;

  function setStatus(text, type = '') {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status ' + type;
  }

  function updateProgress(current, total) {
    const bar = document.getElementById('progressBar');
    const fill = document.getElementById('progressFill');
    bar.style.display = 'block';
    fill.style.width = `${(current / total) * 100}%`;
  }

  function addGalleryItem(vehicle, generating = false) {
    const gallery = document.getElementById('gallery');
    const div = document.createElement('div');
    div.className = 'gallery-item' + (generating ? ' generating' : '');
    div.id = 'item-' + vehicle.replace(/\s+/g, '-');

    if (generating) {
      div.innerHTML = `
        <div class="placeholder"><div class="spinner"></div></div>
        <div class="info">
          <div class="vehicle-name">${vehicle}</div>
          <div class="file-name">Generating...</div>
        </div>`;
    }

    gallery.prepend(div);
    return div;
  }

  function updateGalleryItem(div, vehicle, filename, imageData) {
    div.className = 'gallery-item';
    div.innerHTML = `
      <img src="data:image/png;base64,${imageData}" alt="${vehicle}">
      <div class="info">
        <div class="vehicle-name">${vehicle}</div>
        <a class="file-name download-link" href="data:image/png;base64,${imageData}" download="${filename}">Download ${filename}</a>
      </div>`;
  }

  async function startGeneration() {
    const vehicleText = document.getElementById('vehicleList').value.trim();

    if (!vehicleText) { setStatus('Please add at least one vehicle.', 'error'); return; }

    const vehicles = vehicleText.split('\n').map(v => v.trim()).filter(Boolean);
    if (vehicles.length === 0) { setStatus('No vehicles found.', 'error'); return; }

    running = true;
    aborted = false;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('gallery').innerHTML = '';

    let completed = 0;

    for (const vehicle of vehicles) {
      if (aborted) break;

      setStatus(`Generating ${completed + 1} of ${vehicles.length}: ${vehicle}...`, 'active');
      updateProgress(completed, vehicles.length);

      const card = addGalleryItem(vehicle, true);

      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 180000);

        const resp = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vehicle }),
          signal: controller.signal,
        });

        clearTimeout(timeout);
        const data = await resp.json();

        if (data.error) {
          card.querySelector('.file-name').textContent = `Error: ${data.error}`;
          card.classList.remove('generating');
          card.querySelector('.placeholder').innerHTML = '<span style="color:#ff4a4a;font-size:0.85rem;padding:20px;text-align:center">Failed</span>';
          setStatus(`Error on "${vehicle}": ${data.error}`, 'error');
        } else {
          updateGalleryItem(card, vehicle, data.filename, data.image_data);
          completed++;
          updateProgress(completed, vehicles.length);
        }
      } catch (err) {
        const msg = err.name === 'AbortError' ? 'Request timed out (3 min)' : 'Network error';
        card.querySelector('.file-name').textContent = msg;
        card.classList.remove('generating');
        card.querySelector('.placeholder').innerHTML = `<span style="color:#ff4a4a;font-size:0.85rem;padding:20px;text-align:center">${msg}</span>`;
        setStatus(`${msg} on "${vehicle}"`, 'error');
      }
    }

    running = false;
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;

    if (aborted) {
      setStatus(`Stopped. ${completed} of ${vehicles.length} images generated.`, '');
    } else {
      setStatus(`Done! ${completed} of ${vehicles.length} images generated and saved.`, 'done');
      updateProgress(1, 1);
    }
  }

  function stopGeneration() {
    aborted = true;
    document.getElementById('stopBtn').disabled = true;
    setStatus('Stopping after current image finishes...', '');
  }
</script>
</body>
</html>
