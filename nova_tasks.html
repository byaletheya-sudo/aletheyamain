<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nova Admins — Tasks</title>
<style>
  :root{
    --na-bg:#0c0d11; --na-panel:#15171e; --na-panel-2:#1b1e27; --na-line:rgba(255,255,255,.07);
    --na-line-2:rgba(255,255,255,.12); --na-fg:#e8eaf0; --na-muted:#8b909e; --na-muted-2:#646a78;
    --na-blue:#3a8eef; --na-purple:#8a5cf0; --na-green:#34d399; --na-green-bg:rgba(52,211,153,.13);
    --na-red:#f87171; --na-red-bg:rgba(248,113,113,.13); --na-amber:#fbbf24; --na-amber-bg:rgba(251,191,36,.13);
    --na-mono:"SF Mono",ui-monospace,"Roboto Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--na-bg);color:var(--na-fg);
    font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;font-size:13.5px;line-height:1.45;
    -webkit-font-smoothing:antialiased;}
  .na-app{max-width:1320px;margin:0 auto;padding:26px 26px 80px;}

  /* masthead + suite nav */
  .na-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--na-muted-2);font-weight:700;}
  .na-eyebrow b{color:var(--na-blue);}
  .na-title-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:4px 0 18px;flex-wrap:wrap;}
  .na-title{font-size:30px;font-weight:760;letter-spacing:-.02em;margin:2px 0 0;}
  .na-right{display:flex;align-items:center;gap:9px;}
  .suite-nav{display:inline-flex;gap:4px;background:var(--na-panel);border:1px solid var(--na-line);border-radius:11px;padding:3px;margin-top:12px;}
  .suite-nav a{text-decoration:none;color:var(--na-muted);font-size:12.5px;font-weight:650;padding:6px 13px;border-radius:8px;}
  .suite-nav a.on{background:var(--na-panel-2);color:var(--na-fg);box-shadow:0 1px 0 rgba(255,255,255,.04) inset;}
  .suite-nav a:not(.on):hover{color:var(--na-fg);}

  .na-btn{all:unset;cursor:pointer;background:var(--na-blue);color:#fff;border-radius:10px;padding:9px 14px;
    font-size:12.5px;font-weight:650;display:inline-flex;align-items:center;gap:6px;}
  .na-btn.ghost{background:var(--na-panel);color:var(--na-fg);border:1px solid var(--na-line);}
  .na-sel,.na-in{background:var(--na-panel);border:1px solid var(--na-line);color:var(--na-fg);
    border-radius:10px;padding:8px 11px;font-size:12.5px;font-family:inherit;outline:none;}
  .na-sel:focus,.na-in:focus{border-color:var(--na-line-2);}
  input.na-in[type=date]{font-family:var(--na-mono);font-size:11px;color-scheme:dark;padding:6px 8px;}
  textarea.na-ed{width:100%;background:var(--na-panel-2);border:1px solid var(--na-line);color:var(--na-fg);border-radius:10px;padding:9px 11px;font-family:inherit;font-size:12.5px;outline:none;resize:vertical;}
  textarea.na-ed:focus{border-color:var(--na-blue);}
  .na-filters{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  .na-spacer{flex:1;}
  .mini{font-size:10.5px;color:var(--na-muted-2);}
  .save-tag{font-size:11px;font-weight:650;padding:5px 11px;border-radius:20px;border:1px solid var(--na-line);background:var(--na-panel);white-space:nowrap;}
  .save-tag.ok{color:var(--na-green);border-color:rgba(52,211,153,.3);}
  .save-tag.saving{color:var(--na-amber);border-color:rgba(251,191,36,.3);}
  .save-tag.err{color:var(--na-red);border-color:rgba(248,113,113,.3);}
  .del-btn{background:rgba(248,113,113,.12);color:var(--na-red);border:none;border-radius:8px;padding:7px 12px;font-size:11.5px;font-weight:650;cursor:pointer;}
  .nc-x{all:unset;cursor:pointer;color:var(--na-muted);font-size:15px;line-height:1;}
  .nc-x:hover{color:var(--na-fg);}

  /* stat strip */
  .t-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  .tstat{background:var(--na-panel);border:1px solid var(--na-line);border-radius:14px;padding:13px 15px;}
  .tstat .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--na-muted-2);font-weight:700;}
  .tstat .v{font-family:var(--na-mono);font-size:22px;font-weight:600;margin-top:6px;}
  .tstat .s{font-size:11px;color:var(--na-muted);margin-top:2px;}
  .tstat.red .v{color:var(--na-red);} .tstat.amber .v{color:var(--na-amber);} .tstat.green .v{color:var(--na-green);}

  /* board */
  .tboard{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;}
  .tcol{background:var(--na-panel);border:1px solid var(--na-line);border-radius:14px;padding:10px;min-height:130px;}
  .tcol.drag{border-color:var(--na-blue);background:var(--na-panel-2);}
  .tcol-h{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:650;padding:4px 6px 10px;}
  .tcol-dot{width:8px;height:8px;border-radius:50%;}
  .tcol-dot.backlog{background:#646a78;}.tcol-dot.todo{background:#8b909e;}.tcol-dot.inprogress{background:#fbbf24;}.tcol-dot.done{background:#34d399;}
  .tcol-n{color:var(--na-muted-2);font-family:var(--na-mono);font-size:11px;}
  .tcol-add{margin-left:auto;all:unset;cursor:pointer;color:var(--na-muted);font-size:16px;width:22px;height:22px;text-align:center;border-radius:6px;line-height:22px;}
  .tcol-add:hover{background:var(--na-panel-2);color:var(--na-fg);}
  .tcol-body{display:flex;flex-direction:column;gap:8px;min-height:40px;}
  .tcol-empty{color:var(--na-muted-2);font-size:11px;text-align:center;padding:14px 0;}
  .tcard{background:var(--na-panel-2);border:1px solid var(--na-line);border-radius:11px;padding:11px 12px;cursor:pointer;transition:border-color .12s;}
  .tcard:hover{border-color:var(--na-line-2);}
  .tcard-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;min-height:9px;flex-wrap:wrap;}
  .prio{width:9px;height:9px;border-radius:3px;flex:none;}
  .tlabel{font-size:9.5px;font-weight:650;padding:1px 6px;border-radius:5px;background:rgba(138,92,240,.14);color:#b79bff;}
  .tcard-title{font-size:13px;font-weight:550;line-height:1.35;margin-bottom:9px;}
  .tcard-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--na-muted);}
  .tdue{font-family:var(--na-mono);} .tdue.over{color:var(--na-red);font-weight:650;}
  .tsub{font-family:var(--na-mono);} .tlink{color:#76b4ff;} .tsp{flex:1;}
  .tavatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex:none;}
  .tavatar.none{background:var(--na-panel);border:1px dashed var(--na-line-2);color:var(--na-muted-2);}

  /* view switcher */
  .vsw{display:inline-flex;gap:2px;background:var(--na-panel);border:1px solid var(--na-line);border-radius:11px;padding:3px;}
  .vsw button{all:unset;cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:8px;font-size:12px;font-weight:650;color:var(--na-muted);}
  .vsw button svg{opacity:.75;}
  .vsw button.on{background:var(--na-panel-2);color:var(--na-fg);box-shadow:0 1px 0 rgba(255,255,255,.04) inset;}
  .vsw button:not(.on):hover{color:var(--na-fg);}

  /* list + agenda rows */
  .tlist{background:var(--na-panel);border:1px solid var(--na-line);border-radius:14px;overflow:hidden;}
  .lgroup{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#13151c;border-bottom:1px solid var(--na-line);font-size:11.5px;font-weight:700;}
  .lgroup .tcol-n{margin-left:2px;}
  .lrow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--na-line);cursor:pointer;}
  .lrow:hover{background:var(--na-panel-2);}
  .lrow:last-child{border-bottom:none;}
  .lrow .lt{font-size:13px;font-weight:550;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lrow .lt.done{color:var(--na-muted-2);text-decoration:line-through;}
  .lrow .meta{display:flex;align-items:center;gap:9px;font-size:11px;color:var(--na-muted);flex:none;margin-left:auto;}
  .lempty{padding:10px 14px;color:var(--na-muted-2);font-size:11.5px;border-bottom:1px solid var(--na-line);}

  /* table */
  .ttablewrap{background:var(--na-panel);border:1px solid var(--na-line);border-radius:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table.ttbl{width:100%;border-collapse:collapse;min-width:760px;}
  .ttbl th{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--na-muted-2);font-weight:700;text-align:left;
    padding:11px 13px;border-bottom:1px solid var(--na-line);background:#13151c;white-space:nowrap;cursor:pointer;user-select:none;}
  .ttbl th:hover{color:var(--na-fg);}
  .ttbl th .arr{font-size:9px;margin-left:4px;color:var(--na-blue);}
  .ttbl td{padding:10px 13px;border-bottom:1px solid var(--na-line);font-size:12.5px;vertical-align:middle;white-space:nowrap;}
  .ttbl tr{cursor:pointer;}
  .ttbl tbody tr:hover{background:var(--na-panel-2);}
  .ttbl tr:last-child td{border-bottom:none;}
  .stpill{font-size:10.5px;font-weight:650;padding:2px 8px;border-radius:20px;background:var(--na-panel-2);border:1px solid var(--na-line);}
  .stpill.done{color:var(--na-green);} .stpill.inprogress{color:var(--na-amber);}

  /* calendar */
  .tcal-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .tcal-head h3{margin:0;font-size:15px;font-weight:700;}
  .tcal-nav{all:unset;cursor:pointer;width:28px;height:28px;text-align:center;line-height:28px;border-radius:8px;background:var(--na-panel);border:1px solid var(--na-line);color:var(--na-muted);}
  .tcal-nav:hover{color:var(--na-fg);}
  .tcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .tcal-dow{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--na-muted-2);font-weight:700;text-align:center;padding:2px 0 6px;}
  .tcal-cell{background:var(--na-panel);border:1px solid var(--na-line);border-radius:10px;min-height:96px;padding:6px 6px 8px;cursor:pointer;transition:border-color .12s;}
  .tcal-cell:hover{border-color:var(--na-line-2);}
  .tcal-cell.dim{opacity:.42;}
  .tcal-cell.today{border-color:rgba(58,142,239,.55);box-shadow:0 0 0 1px rgba(58,142,239,.35) inset;}
  .tcal-d{font-family:var(--na-mono);font-size:11px;color:var(--na-muted);margin-bottom:5px;}
  .tcal-cell.today .tcal-d{color:#76b4ff;font-weight:700;}
  .tcal-chip{display:block;font-size:10.5px;font-weight:600;padding:2px 6px;border-radius:5px;background:var(--na-panel-2);border-left:2px solid;
    margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tcal-chip.done{opacity:.45;text-decoration:line-through;}
  .tcal-more{font-size:9.5px;color:var(--na-muted-2);}

  /* agenda */
  .tagenda{display:flex;flex-direction:column;gap:12px;max-width:860px;}
  .ag-day{background:var(--na-panel);border:1px solid var(--na-line);border-radius:14px;overflow:hidden;}
  .ag-h{display:flex;align-items:baseline;gap:9px;padding:10px 14px;background:#13151c;border-bottom:1px solid var(--na-line);}
  .ag-h .d{font-size:13px;font-weight:700;} .ag-h .sub{font-size:11px;color:var(--na-muted-2);font-family:var(--na-mono);}
  .ag-day.today .ag-h .d{color:#76b4ff;}
  .ag-day.overdue .ag-h .d{color:var(--na-red);}

  /* add-by-chat modal */
  .na-chat-scrim{position:fixed;inset:0;background:rgba(4,6,10,.62);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
  .na-chat{width:100%;max-width:640px;background:var(--na-panel);border:1px solid var(--na-line-2);border-radius:18px;display:flex;flex-direction:column;max-height:82vh;box-shadow:0 30px 80px rgba(0,0,0,.6);}
  .nc-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--na-line);font-weight:650;font-size:14px;}
  .nc-log{flex:1;overflow:auto;padding:16px 18px;display:flex;flex-direction:column;gap:10px;min-height:130px;}
  .nc-msg{max-width:86%;padding:9px 13px;border-radius:13px;font-size:13px;line-height:1.5;}
  .nc-msg.me{align-self:flex-end;background:var(--na-blue);color:#fff;border-bottom-right-radius:4px;white-space:pre-wrap;}
  .nc-msg.bot{align-self:flex-start;background:var(--na-panel-2);border:1px solid var(--na-line);border-bottom-left-radius:4px;}
  .nc-msg.bot.ok{border-color:rgba(52,211,153,.32);}
  .nc-msg.bot .nm-link{color:#76b4ff;cursor:pointer;font-weight:650;}
  .nc-input{display:flex;gap:9px;padding:13px 16px;border-top:1px solid var(--na-line);align-items:flex-end;}
  .nc-input textarea{flex:1;background:var(--na-panel-2);border:1px solid var(--na-line);color:var(--na-fg);border-radius:11px;padding:10px 12px;font-family:inherit;font-size:13px;resize:none;outline:none;max-height:120px;}
  .nc-input textarea:focus{border-color:var(--na-blue);}
  .nc-input .na-btn{padding:10px 18px;}
  .nc-mic{all:unset;cursor:pointer;width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;border:1px solid var(--na-line);color:var(--na-muted);background:var(--na-panel-2);flex:none;}
  .nc-mic:hover{color:var(--na-fg);border-color:var(--na-line-2);}
  .nc-mic.rec{background:rgba(248,113,113,.15);color:var(--na-red);border-color:rgba(248,113,113,.45);animation:micpulse 1.1s infinite;}
  @keyframes micpulse{0%,100%{opacity:1}50%{opacity:.45}}

  /* task modal */
  .tmodal-scrim{position:fixed;inset:0;background:rgba(4,6,10,.62);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
  .tmodal{width:100%;max-width:600px;max-height:86vh;overflow:auto;background:var(--na-panel);border:1px solid var(--na-line-2);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.6);}
  .tm-head{display:flex;gap:10px;align-items:flex-start;padding:16px 18px 8px;}
  .tm-title{flex:1;background:transparent;border:none;color:var(--na-fg);font-size:18px;font-weight:680;outline:none;}
  .tm-body{padding:6px 18px 14px;display:flex;flex-direction:column;gap:11px;}
  .tm-row{display:flex;align-items:center;gap:12px;font-size:12.5px;}
  .tm-l{width:82px;color:var(--na-muted-2);font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;flex:none;}
  .tm-sub{border-top:1px solid var(--na-line);padding-top:11px;}
  .tm-sub .tm-l{width:auto;margin-bottom:8px;}
  .subrow{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .subrow input[type=checkbox]{accent-color:var(--na-green);width:15px;height:15px;flex:none;}
  .subtext{flex:1;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--na-fg);font-size:12.5px;outline:none;padding:3px 0;}
  .subtext:focus{border-bottom-color:var(--na-line-2);}
  .subtext.done{text-decoration:line-through;color:var(--na-muted-2);}
  .subx{all:unset;cursor:pointer;color:var(--na-muted-2);font-size:11px;} .subx:hover{color:var(--na-red);}
  .tm-notes{border-top:1px solid var(--na-line);padding-top:11px;} .tm-notes .tm-l{margin-bottom:6px;}
  .tm-foot{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-top:1px solid var(--na-line);}
  .hide{display:none;}

  /* mobile */
  @media (max-width:720px){
    .na-app{padding:16px 14px 60px;}
    .na-title{font-size:24px;}
    .t-stats{grid-template-columns:repeat(2,1fr);}
    .tboard{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;gap:10px;padding-bottom:6px;}
    .tcol{flex:0 0 82vw;scroll-snap-align:start;}
    .tmodal-scrim{padding:10px;align-items:flex-end;}
    .tmodal{max-height:92vh;border-radius:16px 16px 12px 12px;}
    .tm-row{flex-wrap:wrap;}
    .tm-row .na-in{max-width:100%;}
    .vsw .vl{display:none;}
    .vsw button{padding:7px 9px;}
    .tcal-cell{min-height:58px;padding:4px;}
    .tcal-chip{font-size:8.5px;padding:1px 3px;}
    .tcal-head{flex-wrap:wrap;}
    .lrow .meta .stpill{display:none;}
  }
</style>
</head>
<body>
<div class="na-app">

  <div class="na-eyebrow">NOVA ADMINS · <b>byAletheya</b></div>
  <div class="na-title-row">
    <div>
      <h1 class="na-title">Task Manager</h1>
      <nav class="suite-nav">
        <a href="/nova-admins">Deal Ledger</a>
        <a class="on" href="/nova-admins/tasks">Tasks</a>
        <a href="/nova-admins/notes">Notes</a>
      </nav>
    </div>
    <div class="na-right"><span id="saveTag" class="save-tag hide"></span> <a class="na-btn ghost" style="text-decoration:none;padding:6px 11px;font-size:11.5px" href="/logout" title="Sign out of everything">🔒 Lock</a></div>
  </div>

  <div class="t-stats" id="tStats"></div>

  <div class="na-filters">
    <nav class="vsw" id="viewSwitch">
      <button data-v="board" onclick="setView('board')" title="Board"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1.5"/><rect x="10" y="3" width="5" height="12" rx="1.5"/><rect x="17" y="3" width="5" height="15" rx="1.5"/></svg><span class="vl">Board</span></button>
      <button data-v="list" onclick="setView('list')" title="List"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="4" cy="6" r="1.2" fill="currentColor"/><circle cx="4" cy="12" r="1.2" fill="currentColor"/><circle cx="4" cy="18" r="1.2" fill="currentColor"/></svg><span class="vl">List</span></button>
      <button data-v="table" onclick="setView('table')" title="Table"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16M15 4v16"/></svg><span class="vl">Table</span></button>
      <button data-v="cal" onclick="setView('cal')" title="Calendar"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M8 3v4M16 3v4M3 11h18"/></svg><span class="vl">Calendar</span></button>
      <button data-v="agenda" onclick="setView('agenda')" title="Agenda"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg><span class="vl">Agenda</span></button>
    </nav>
    <select class="na-sel" id="tfAssignee" onchange="renderTasks()"><option value="all">All assignees</option></select>
    <div class="na-spacer"></div>
    <button class="na-btn" style="background:var(--na-purple)" onclick="openChat()">✨ Add by chat</button>
    <button class="na-btn" onclick="newTask('todo')">+ New task</button>
  </div>
  <div id="tasksView"></div>

</div>

<div class="na-chat-scrim hide" id="chatScrim" onclick="closeChat(event)">
  <div class="na-chat" onclick="event.stopPropagation()">
    <div class="nc-head"><span>✨ Add tasks — just say it</span><button class="nc-x" onclick="closeChat()">✕</button></div>
    <div class="nc-log" id="chatLog"></div>
    <div class="nc-input">
      <textarea id="chatText" rows="2" placeholder="e.g. Nema needs to pay the agents by Friday — verify totals first, then send the zelles. Also remind me to renew the Meta ads next Monday."></textarea>
      <button class="nc-mic" id="micBtn" onclick="toggleMic()" title="Dictate (voice)"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3M8 21h8"/></svg></button>
      <button class="na-btn" id="chatSend" onclick="sendChat()">Add</button>
    </div>
  </div>
</div>

<div class="tmodal-scrim hide" id="taskScrim" onclick="closeTask(event)">
  <div class="tmodal" onclick="event.stopPropagation()" id="taskModal"></div>
</div>

<script>
/*NOVA_SEED*/
const SEED = (typeof window!=="undefined" && window.NOVA_SEED) || {};
const TASKS = SEED.tasks || [];
const DEALS = SEED.deals || [];
const ASSIGNEES = [{id:"nema",name:"Nema",color:"#f472b6"},{id:"arvin",name:"Arvin",color:"#8a5cf0"},{id:"edgar",name:"Edgar",color:"#3a8eef"}];
const T_STATUS = [{id:"backlog",name:"Backlog"},{id:"todo",name:"Todo"},{id:"inprogress",name:"In Progress"},{id:"done",name:"Done"}];
const T_PRIO = {urgent:{l:"Urgent",c:"#f87171"},high:{l:"High",c:"#fb923c"},medium:{l:"Medium",c:"#fbbf24"},low:{l:"Low",c:"#60a5fa"},none:{l:"No priority",c:"#646a78"}};
const NOW=new Date(), _pad=n=>String(n).padStart(2,"0");
const TODAY=NOW.getFullYear()+"-"+_pad(NOW.getMonth()+1)+"-"+_pad(NOW.getDate());
function asg(id){ return ASSIGNEES.find(a=>a.id===id); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

// ---- persistence (row-level, shared store) ----
function markSaved(s,cls){ const el=document.getElementById("saveTag"); if(!el)return; el.textContent=s; el.className="save-tag "+cls; }
async function saveRow(payload){
  if(location.protocol==="file:")return;
  markSaved("Saving…","saving");
  try{ const r=await fetch("/nova-admins/mutate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    markSaved(r.ok?"✓ Saved":"Save failed", r.ok?"ok":"err"); }
  catch(e){ markSaved("Save failed — offline","err"); }
}
function saveTask(id){ const t=TASKS.find(x=>x.id===id); if(t) saveRow({task:t}); }
function deleteTaskRemote(id){ saveRow({deleteTask:id}); }

// ---- stats ----
function renderStats(){
  const open=TASKS.filter(t=>t.status!=="done");
  const overdue=open.filter(t=>t.due&&t.due<TODAY).length;
  const dueToday=open.filter(t=>t.due===TODAY).length;
  const doneWeek=TASKS.filter(t=>t.status==="done").length;
  document.getElementById("tStats").innerHTML=[
    {l:"Open tasks",v:open.length,s:"across the board",c:""},
    {l:"Overdue",v:overdue,s:overdue?"needs attention":"all clear",c:overdue?"red":"green"},
    {l:"Due today",v:dueToday,s:TODAY,c:dueToday?"amber":""},
    {l:"Done",v:doneWeek,s:"completed",c:"green"},
  ].map(x=>`<div class="tstat ${x.c}"><div class="l">${x.l}</div><div class="v">${x.v}</div><div class="s">${x.s}</div></div>`).join("");
}

// ---- board ----
function fmtDue(d){ if(!d)return""; const dt=new Date(d+"T12:00:00"); return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
function tSelHtml(opts, sel, handler){ return `<select class="na-in" onchange="${handler}">${opts.map(([v,l])=>`<option value="${esc(v)}" ${v===sel?'selected':''}>${esc(l)}</option>`).join("")}</select>`; }
function taskCard(t){
  const p=T_PRIO[t.priority||"none"], as=asg(t.assignee), subs=t.subtasks||[], done=subs.filter(s=>s.done).length;
  const overdue = t.due && t.status!=="done" && t.due < TODAY;
  const dl = t.dealId!=null ? DEALS.find(d=>d.id===t.dealId) : null;
  return `<div class="tcard" draggable="true" ondragstart="dragTask(event,${t.id})" onclick="openTask(${t.id})">
    <div class="tcard-top"><span class="prio" style="background:${p.c}" title="${p.l}"></span>
      ${(t.labels||[]).slice(0,3).map(l=>`<span class="tlabel">${esc(l)}</span>`).join("")}</div>
    <div class="tcard-title">${esc(t.title)||'<span style="color:var(--na-muted-2)">Untitled task</span>'}</div>
    <div class="tcard-meta">
      ${t.due?`<span class="tdue ${overdue?'over':''}">${fmtDue(t.due)}</span>`:""}
      ${subs.length?`<span class="tsub">☑ ${done}/${subs.length}</span>`:""}
      ${dl?`<span class="tlink" title="${esc(dl.client)}">🔗</span>`:""}
      <span class="tsp"></span>
      ${as?`<span class="tavatar" style="background:${as.color}" title="${as.name}">${as.name[0]}</span>`:`<span class="tavatar none">?</span>`}
    </div></div>`;
}
// ---- five views: board / list / table / calendar / agenda ----
function lsGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
const PRIO_ORD={urgent:0,high:1,medium:2,low:3,none:4};
const ST_ORD={backlog:0,todo:1,inprogress:2,done:3};
let tView=lsGet("nt_view")||"board";
let calRef=new Date(NOW.getFullYear(),NOW.getMonth(),1);
let agRef=(function(){const d=new Date(NOW);d.setDate(d.getDate()-((d.getDay()+6)%7));return d;})();
let tSort={key:"due",dir:1};
function setView(v){ tView=v; lsSet("nt_view",v); renderTasks(); }
function ymd(d){ return d.getFullYear()+"-"+_pad(d.getMonth()+1)+"-"+_pad(d.getDate()); }
function filtered(){ const fa=(document.getElementById("tfAssignee")||{}).value||"all";
  return fa==="all"?TASKS.slice():TASKS.filter(t=>(t.assignee||"")===fa); }
function stName(id){ return (T_STATUS.find(s=>s.id===id)||{}).name||id; }

function renderTasks(){
  document.querySelectorAll("#viewSwitch button").forEach(b=>b.classList.toggle("on",b.dataset.v===tView));
  const el=document.getElementById("tasksView"), items=filtered();
  if(tView==="board"){ el.className="tboard"; el.innerHTML=boardHtml(items); }
  else if(tView==="list"){ el.className="tlist"; el.innerHTML=listHtml(items); }
  else if(tView==="table"){ el.className="ttablewrap"; el.innerHTML=tableHtml(items); }
  else if(tView==="cal"){ el.className=""; el.innerHTML=calHtml(items); }
  else { el.className="tagenda"; el.innerHTML=agendaHtml(items); }
  renderStats();
}

// Board (kanban, drag-drop)
function boardHtml(items){
  return T_STATUS.map(st=>{
    const g=items.filter(t=>(t.status||"backlog")===st.id);
    return `<div class="tcol" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="this.classList.remove('drag');dropTask(event,'${st.id}')">
      <div class="tcol-h"><span class="tcol-dot ${st.id}"></span>${st.name} <span class="tcol-n">${g.length}</span>
        <button class="tcol-add" onclick="newTask('${st.id}')" title="Add task">+</button></div>
      <div class="tcol-body">${g.map(taskCard).join("")||'<div class="tcol-empty">No tasks</div>'}</div>
    </div>`;
  }).join("");
}

// Shared compact row (list + agenda)
function lrowHtml(t,showStatus){
  const p=T_PRIO[t.priority||"none"], as=asg(t.assignee), subs=t.subtasks||[], dn=subs.filter(s=>s.done).length;
  const overdue=t.due&&t.status!=="done"&&t.due<TODAY;
  return `<div class="lrow" onclick="openTask(${t.id})">
    <span class="prio" style="background:${p.c}"></span>
    <span class="lt ${t.status==='done'?'done':''}">${esc(t.title)||'Untitled task'}</span>
    ${(t.labels||[]).slice(0,2).map(l=>`<span class="tlabel">${esc(l)}</span>`).join("")}
    <span class="meta">
      ${showStatus?`<span class="stpill ${t.status}">${stName(t.status||'backlog')}</span>`:""}
      ${subs.length?`<span class="tsub">☑ ${dn}/${subs.length}</span>`:""}
      ${t.due?`<span class="tdue ${overdue?'over':''}">${fmtDue(t.due)}</span>`:""}
      ${as?`<span class="tavatar" style="background:${as.color}">${as.name[0]}</span>`:`<span class="tavatar none">?</span>`}
    </span></div>`;
}

// List (grouped by status)
function listHtml(items){
  return T_STATUS.map(st=>{
    const g=items.filter(t=>(t.status||"backlog")===st.id).sort((a,b)=>PRIO_ORD[a.priority||"none"]-PRIO_ORD[b.priority||"none"]);
    return `<div class="lgroup"><span class="tcol-dot ${st.id}"></span>${st.name} <span class="tcol-n">${g.length}</span></div>`
      + (g.map(t=>lrowHtml(t,false)).join("")||`<div class="lempty">No tasks</div>`);
  }).join("");
}

// Table (sortable)
function sortBy(k){ if(tSort.key===k) tSort.dir*=-1; else tSort={key:k,dir:1}; renderTasks(); }
function tableHtml(items){
  const dir=tSort.dir;
  const val=t=>({title:(t.title||"").toLowerCase(), status:ST_ORD[t.status||"backlog"], priority:PRIO_ORD[t.priority||"none"],
    assignee:(asg(t.assignee)||{name:"~"}).name, due:t.due||"9999-99", subs:(t.subtasks||[]).length}[tSort.key]);
  const rows=items.slice().sort((a,b)=>{const x=val(a),y=val(b);return x<y?-dir:x>y?dir:0;});
  const th=(k,l)=>`<th onclick="sortBy('${k}')">${l}${tSort.key===k?`<span class="arr">${dir>0?'▲':'▼'}</span>`:''}</th>`;
  return `<table class="ttbl"><thead><tr>${th("title","Task")}${th("status","Status")}${th("priority","Priority")}${th("assignee","Assignee")}${th("due","Due")}${th("subs","Sub-tasks")}<th>Labels</th></tr></thead><tbody>`
   + rows.map(t=>{const p=T_PRIO[t.priority||"none"], as=asg(t.assignee), subs=t.subtasks||[], dn=subs.filter(s=>s.done).length;
      const overdue=t.due&&t.status!=="done"&&t.due<TODAY;
      return `<tr onclick="openTask(${t.id})">
        <td style="white-space:normal;min-width:220px"><span class="prio" style="background:${p.c};display:inline-block;margin-right:7px"></span><span class="lt ${t.status==='done'?'done':''}" style="font-weight:600">${esc(t.title)||'Untitled'}</span></td>
        <td><span class="stpill ${t.status}">${stName(t.status||'backlog')}</span></td>
        <td style="color:${p.c}">${p.l}</td>
        <td>${as?`${as.name}`:'—'}</td>
        <td class="tdue ${overdue?'over':''}">${t.due?fmtDue(t.due):'—'}</td>
        <td class="tsub">${subs.length?dn+"/"+subs.length:'—'}</td>
        <td>${(t.labels||[]).map(l=>`<span class="tlabel">${esc(l)}</span>`).join(" ")||'—'}</td></tr>`;}).join("")
   + `</tbody></table>`;
}

// Calendar (month)
function calMove(n){ calRef=new Date(calRef.getFullYear(),calRef.getMonth()+n,1); renderTasks(); }
function calToday(){ calRef=new Date(NOW.getFullYear(),NOW.getMonth(),1); renderTasks(); }
function calHtml(items){
  const m=calRef.getMonth(), first=new Date(calRef);
  const start=new Date(first); start.setDate(1-((first.getDay()+6)%7));
  const byDay={}; items.forEach(t=>{ if(t.due)(byDay[t.due]=byDay[t.due]||[]).push(t); });
  let cells="";
  for(let i=0;i<42;i++){
    const d=new Date(start); d.setDate(start.getDate()+i); const k=ymd(d);
    const g=(byDay[k]||[]).sort((a,b)=>PRIO_ORD[a.priority||"none"]-PRIO_ORD[b.priority||"none"]);
    cells+=`<div class="tcal-cell ${d.getMonth()!==m?'dim':''} ${k===TODAY?'today':''}" onclick="newTaskOn('${k}')">
      <div class="tcal-d">${d.getDate()}</div>`
      + g.slice(0,3).map(t=>`<span class="tcal-chip ${t.status==='done'?'done':''}" style="border-color:${T_PRIO[t.priority||'none'].c}" onclick="event.stopPropagation();openTask(${t.id})">${esc(t.title)||'Untitled'}</span>`).join("")
      + (g.length>3?`<span class="tcal-more">+${g.length-3} more</span>`:"") + `</div>`;
  }
  const dows=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(x=>`<div class="tcal-dow">${x}</div>`).join("");
  return `<div class="tcal-head"><h3>${calRef.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</h3>
    <button class="tcal-nav" onclick="calMove(-1)">‹</button><button class="tcal-nav" onclick="calMove(1)">›</button>
    <button class="na-btn ghost" style="padding:5px 11px;font-size:11px" onclick="calToday()">Today</button>
    <span class="mini" style="margin-left:auto">tap a day to add a task</span></div>
    <div class="tcal-grid">${dows}${cells}</div>`;
}
function newTaskOn(date){ newTask("todo",date); }

// Agenda (week)
function agMove(n){ const d=new Date(agRef); d.setDate(d.getDate()+7*n); agRef=d; renderTasks(); }
function agToday(){ const d=new Date(NOW); d.setDate(d.getDate()-((d.getDay()+6)%7)); agRef=d; renderTasks(); }
function agendaHtml(items){
  const days=[0,1,2,3,4,5,6].map(i=>{const d=new Date(agRef);d.setDate(agRef.getDate()+i);return d;});
  const head=`<div class="tcal-head"><h3>Week of ${days[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${days[6].toLocaleDateString("en-US",{month:"short",day:"numeric"})}</h3>
    <button class="tcal-nav" onclick="agMove(-1)">‹</button><button class="tcal-nav" onclick="agMove(1)">›</button>
    <button class="na-btn ghost" style="padding:5px 11px;font-size:11px" onclick="agToday()">This week</button></div>`;
  const over=items.filter(t=>t.due&&t.due<TODAY&&t.status!=="done").sort((a,b)=>a.due<b.due?-1:1);
  const overSec=over.length?`<div class="ag-day overdue"><div class="ag-h"><span class="d">Overdue</span><span class="sub">${over.length} task${over.length>1?'s':''}</span></div>${over.map(t=>lrowHtml(t,true)).join("")}</div>`:"";
  const daySecs=days.map(d=>{const k=ymd(d);
    const g=items.filter(t=>t.due===k).sort((a,b)=>PRIO_ORD[a.priority||"none"]-PRIO_ORD[b.priority||"none"]);
    return `<div class="ag-day ${k===TODAY?'today':''}"><div class="ag-h"><span class="d">${d.toLocaleDateString("en-US",{weekday:"long"})}</span><span class="sub">${d.toLocaleDateString("en-US",{month:"short",day:"numeric"})}${k===TODAY?' · today':''}</span></div>${g.map(t=>lrowHtml(t,true)).join("")||'<div class="lempty" style="border-bottom:none">Nothing due</div>'}</div>`;
  }).join("");
  const un=items.filter(t=>!t.due&&t.status!=="done");
  const unSec=un.length?`<div class="ag-day"><div class="ag-h"><span class="d">No due date</span><span class="sub">${un.length}</span></div>${un.map(t=>lrowHtml(t,true)).join("")}</div>`:"";
  return head+overSec+daySecs+unSec;
}

// ---- modal ----
let _openTask=null;
function openTask(id){ _openTask=id; renderTaskModal(); document.getElementById("taskScrim").classList.remove("hide"); }
function closeTask(e){ if(e&&e.target&&e.target.id!=="taskScrim")return; document.getElementById("taskScrim").classList.add("hide"); _openTask=null; }
function renderTaskModal(){
  const t=TASKS.find(x=>x.id===_openTask); if(!t)return;
  const E=`editTask(${t.id},`, subs=t.subtasks||[];
  const dealOpts=[["","— none —"]].concat(DEALS.slice().sort((a,b)=>a.date<b.date?1:-1).slice(0,250).map(d=>[String(d.id),(d.client||'—')+" · "+[d.year,d.make,d.model].filter(Boolean).join(' ')]));
  document.getElementById("taskModal").innerHTML=`
    <div class="tm-head"><input class="tm-title" value="${esc(t.title)}" placeholder="Task title…" onchange="${E}'title',this.value)">
      <button class="nc-x" onclick="closeTask()">✕</button></div>
    <div class="tm-body">
      <div class="tm-row"><span class="tm-l">Status</span>${tSelHtml(T_STATUS.map(s=>[s.id,s.name]),t.status||'backlog',E+"'status',this.value)")}</div>
      <div class="tm-row"><span class="tm-l">Priority</span>${tSelHtml(Object.entries(T_PRIO).map(([k,v])=>[k,v.l]),t.priority||'none',E+"'priority',this.value)")}</div>
      <div class="tm-row"><span class="tm-l">Assignee</span>${tSelHtml([["","Unassigned"]].concat(ASSIGNEES.map(a=>[a.id,a.name])),t.assignee||'',E+"'assignee',this.value)")}</div>
      <div class="tm-row"><span class="tm-l">Due date</span><input type="date" class="na-in" value="${t.due||''}" onchange="${E}'due',this.value)"></div>
      <div class="tm-row"><span class="tm-l">Labels</span><input class="na-in" style="flex:1" value="${esc((t.labels||[]).join(', '))}" placeholder="Payroll, Deals, Follow-up…" onchange="editTaskLabels(${t.id},this.value)"></div>
      <div class="tm-row"><span class="tm-l">Link deal</span><select class="na-in" style="flex:1" onchange="editTask(${t.id},'dealId',this.value?+this.value:null)">${dealOpts.map(([v,l])=>`<option value="${v}" ${v===String(t.dealId||'')?'selected':''}>${esc(l)}</option>`).join("")}</select></div>
      <div class="tm-sub"><div class="tm-l">Sub-tasks ${subs.length?'· '+subs.filter(s=>s.done).length+'/'+subs.length:''}</div>
        ${subs.map((s,i)=>`<div class="subrow"><input type="checkbox" ${s.done?'checked':''} onchange="toggleSub(${t.id},${i})"><input class="subtext ${s.done?'done':''}" value="${esc(s.text)}" onchange="editSub(${t.id},${i},this.value)"><button class="subx" onclick="delSub(${t.id},${i})">✕</button></div>`).join("")}
        <div class="subrow"><input type="checkbox" disabled style="opacity:.3"><input id="newSub" class="subtext" placeholder="Add sub-task, press Enter" onkeydown="if(event.key==='Enter'){addSub(${t.id},this.value);}"></div>
      </div>
      <div class="tm-notes"><div class="tm-l">Notes</div><textarea class="na-ed" rows="4" placeholder="Details, context…" onchange="${E}'notes',this.value)">${esc(t.notes||'')}</textarea></div>
    </div>
    <div class="tm-foot"><button class="del-btn" onclick="delTask(${t.id})">Delete task</button><span class="mini">Created ${t.created||'—'}</span></div>`;
}

// ---- CRUD ----
function editTask(id,field,val){ const t=TASKS.find(x=>x.id===id); if(!t)return; t[field]=val; saveTask(id); renderTasks(); if(_openTask===id)renderTaskModal(); }
function editTaskLabels(id,val){ const t=TASKS.find(x=>x.id===id); if(!t)return; t.labels=val.split(',').map(s=>s.trim()).filter(Boolean); saveTask(id); renderTasks(); renderTaskModal(); }
function toggleSub(id,i){ const t=TASKS.find(x=>x.id===id); t.subtasks[i].done=!t.subtasks[i].done; saveTask(id); renderTasks(); renderTaskModal(); }
function editSub(id,i,val){ const t=TASKS.find(x=>x.id===id); t.subtasks[i].text=val; saveTask(id); }
function delSub(id,i){ const t=TASKS.find(x=>x.id===id); t.subtasks.splice(i,1); saveTask(id); renderTasks(); renderTaskModal(); }
function addSub(id,val){ val=(val||'').trim(); if(!val)return; const t=TASKS.find(x=>x.id===id); (t.subtasks=t.subtasks||[]).push({text:val,done:false}); saveTask(id); renderTasks(); renderTaskModal(); setTimeout(()=>{const el=document.getElementById('newSub'); if(el)el.focus();},20); }
function newTask(status,due){
  const id=(TASKS.reduce((m,t)=>Math.max(m,t.id),0)||0)+1;
  TASKS.unshift({id,title:"",status:status||"todo",priority:"none",assignee:"",due:due||"",notes:"",subtasks:[],labels:[],dealId:null,created:TODAY});
  saveTask(id); renderTasks(); openTask(id); setTimeout(()=>{const el=document.querySelector(".tm-title"); if(el)el.focus();},40);
}
function delTask(id){ if(!confirm("Delete this task?"))return; const i=TASKS.findIndex(t=>t.id===id); if(i>=0)TASKS.splice(i,1); closeTask(); deleteTaskRemote(id); renderTasks(); }
let _dragTask=null;
function dragTask(e,id){ _dragTask=id; e.dataTransfer.effectAllowed="move"; }
function dropTask(e,status){ e.preventDefault(); if(_dragTask==null)return; const t=TASKS.find(x=>x.id===_dragTask); if(t&&t.status!==status){ t.status=status; saveTask(_dragTask); renderTasks(); } _dragTask=null; }

// ---- add-by-chat (AI parse) ----
function openChat(){ document.getElementById("chatScrim").classList.remove("hide");
  if(!document.getElementById("chatLog").children.length)
    chatBot("Tell me what needs doing — who it's for, when it's due, the steps. I'll build the tasks with sub-tasks, priority and labels. Several at once is fine.", false);
  setTimeout(()=>document.getElementById("chatText").focus(),30); }
function closeChat(e){ if(e&&e.target&&e.target.id!=="chatScrim")return; document.getElementById("chatScrim").classList.add("hide"); if(_recOn&&_rec){try{_rec.stop();}catch(x){}} }
function chatMe(t){ const l=document.getElementById("chatLog"),d=document.createElement("div"); d.className="nc-msg me"; d.textContent=t; l.appendChild(d); l.scrollTop=l.scrollHeight; }
function chatBot(html,ok){ const l=document.getElementById("chatLog"),d=document.createElement("div"); d.className="nc-msg bot"+(ok?" ok":""); d.innerHTML=html; l.appendChild(d); l.scrollTop=l.scrollHeight; return d; }
async function sendChat(){
  const ta=document.getElementById("chatText"), text=ta.value.trim(); if(!text) return;
  chatMe(text); ta.value=""; const btn=document.getElementById("chatSend"); btn.disabled=true;
  const thinking=chatBot("<span class='mini'>working it out…</span>", false);
  try{
    const res=await fetch("/nova-admins/parse-task",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({text, today:TODAY})});
    const out=await res.json(); thinking.remove();
    if(!res.ok||out.error){ chatBot("⚠️ "+(out.error||"Couldn't reach the parser."),false); btn.disabled=false; return; }
    if(!out.ok||!(out.tasks||[]).length){ chatBot("That didn't read like a task — tell me what needs to get done.",false); btn.disabled=false; return; }
    const made=out.tasks.map(addParsedTask);
    renderTasks();
    chatBot(`✓ ${out.summary||("Added "+made.length+" task"+(made.length>1?"s":""))}<br>`
      + made.map(t=>{const as=asg(t.assignee);
        return `• <b>${esc(t.title)}</b> <span class="mini">${[as&&as.name, t.due&&fmtDue(t.due), (t.subtasks||[]).length?((t.subtasks.length)+" sub-tasks"):""].filter(Boolean).join(" · ")}</span> <span class="nm-link" onclick="closeChat();openTask(${t.id})">Open →</span>`;}).join("<br>"), true);
  }catch(err){ thinking.remove(); chatBot("⚠️ "+err.message,false); }
  btn.disabled=false;
}
function addParsedTask(o){
  const id=(TASKS.reduce((m,t)=>Math.max(m,t.id),0)||0)+1;
  const t={id, title:o.title||"", status:["backlog","todo","inprogress","done"].includes(o.status)?o.status:"todo",
    priority:["urgent","high","medium","low"].includes(o.priority)?o.priority:"none",
    assignee:ASSIGNEES.some(a=>a.id===o.assignee)?o.assignee:"", due:/^\d{4}-\d{2}-\d{2}$/.test(o.due||"")?o.due:"",
    notes:o.notes||"", subtasks:(o.subtasks||[]).map(s=>({text:String(s),done:false})),
    labels:(o.labels||[]).slice(0,3), dealId:null, created:TODAY};
  TASKS.unshift(t); saveTask(id); return t;
}
// voice dictation (Chrome + HTTPS)
let _rec=null,_recOn=false;
function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert("Voice input needs Chrome over HTTPS — not available here."); return; }
  if(_recOn){ try{_rec.stop();}catch(e){} return; }
  _rec=new SR(); _rec.lang="en-US"; _rec.interimResults=true; _rec.continuous=true;
  const ta=document.getElementById("chatText"); const base=ta.value.trim();
  _rec.onstart=()=>{ _recOn=true; const b=document.getElementById("micBtn"); if(b)b.classList.add("rec"); };
  _rec.onend  =()=>{ _recOn=false; const b=document.getElementById("micBtn"); if(b)b.classList.remove("rec"); };
  _rec.onerror=()=>{ _recOn=false; const b=document.getElementById("micBtn"); if(b)b.classList.remove("rec"); };
  _rec.onresult=e=>{ let t=""; for(let i=0;i<e.results.length;i++) t+=e.results[i][0].transcript; ta.value=(base?base+" ":"")+t; };
  try{_rec.start();}catch(e){}
}

// ---- boot ----
document.getElementById("chatText").addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendChat(); }});
document.getElementById("tfAssignee").innerHTML += ASSIGNEES.map(a=>`<option value="${a.id}">${a.name}</option>`).join("");
const _hv=(location.hash.match(/view=(\w+)/)||[])[1]; if(_hv) tView=_hv;   // deep-link: #view=cal etc.
renderTasks();
if(location.hash.indexOf("chat")>=0){ openChat(); }
if(location.hash.indexOf("open")>=0 && TASKS.length){ openTask(TASKS[0].id); }
</script>
